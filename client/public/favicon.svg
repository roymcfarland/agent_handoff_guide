<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .paper { fill: #f4efe6; }
    .cover { fill: #f4efe6; stroke: #0e2a47; }
    .grid { stroke: #7da2b8; stroke-opacity: 0.45; }
    .band { fill: #c8362d; }
    .staple { stroke: #0e2a47; }
    @media (prefers-color-scheme: dark) {
      .paper { fill: #0c1524; }
      .cover { fill: #0c1524; stroke: #a8c6dd; }
      .grid { stroke: #3d5a78; stroke-opacity: 0.6; }
      .band { fill: #e05545; }
      .staple { stroke: #a8c6dd; }
    }
  </style>
  <rect class="paper" width="64" height="64" />
  <!-- memo book: rounded cover, graph-grid face -->
  <rect class="cover" x="13" y="5" width="40" height="54" rx="5.5" stroke-width="5" />
  <path
    class="grid"
    d="M23 8V56M33 8V56M43 8V56M16 15H50M16 25H50M16 45H50"
    fill="none"
    stroke-width="1.5"
  />
  <!-- brand band across the lower third -->
  <rect class="band" x="16" y="33" width="34" height="9" />
  <!-- staple binding on the spine -->
  <path class="staple" d="M8 19H18M8 45H18" fill="none" stroke-width="3.5" />
</svg>
