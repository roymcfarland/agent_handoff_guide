name: "Site bug report"
description: "Something on worksmithlabs.com renders wrong, reads wrong, or is broken."
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What's wrong
      description: "What you saw vs. what you expected. Screenshots welcome."
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where
      description: "Section anchor or URL, e.g. https://www.worksmithlabs.com/#field-notes"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser / device / theme
      placeholder: "e.g. Safari 19 on iPhone, dark mode"
    validations:
      required: false
